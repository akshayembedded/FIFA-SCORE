; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; The TFT_eSPI library is vendored in lib/ and configured via its User_Setup.h
; (ILI9488 480x320 on the ESP32 SPI pins). ArduinoJson parses the API response.
board_build.filesystem = littlefs

; Default ESP32 layout reserves TWO 1.31MB app slots for OTA, so the firmware
; was capped at ~96% of one slot. We flash over USB (no OTA), so switch to the
; single-slot "huge_app" table: 3MB for the app + ~896KB for the LittleFS data
; (fonts + flags). Drops flash usage from ~96% to ~40%.
board_build.partitions = huge_app.csv

lib_deps =
	bblanchon/ArduinoJson@^7.2.0
	bitbank2/PNGdec@^1.0.3
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

; The TFT_eSPI config comes from lib/TFT_eSPI/User_Setup.h (ILI9488 + ESP32 pins).
; This board has PSRAM: enabling it lets large allocations (TFT sprites, the PNG
; decode buffer, TLS/JSON) spill into the extra 4MB instead of starving the
; ~300KB internal heap.
build_flags =
	-DBOARD_HAS_PSRAM
